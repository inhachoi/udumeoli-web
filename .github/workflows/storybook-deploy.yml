name: Storybook Deploy

on:
  pull_request:
    types:
      - labeled
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: contains(github.event.pull_request.labels.*.name, 'storybook')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: storybook-static
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: storybook
          message: |
            ## 📚 Storybook 배포 완료

            ${{ github.event.pull_request.head.sha }} 기준으로 배포되었습니다.

            🔗 **URL:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/
