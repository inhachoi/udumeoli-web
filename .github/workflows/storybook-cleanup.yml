name: Storybook Cleanup

on:
  pull_request:
    types:
      - closed
      - unlabeled

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    if: |
      github.event_name == 'pull_request' && (
        github.event.action == 'closed' ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'storybook')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check gh-pages exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/branches/gh-pages --silent 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove PR directory
        if: steps.check.outputs.exists == 'true'
        run: |
          if [ -d "pr-${{ github.event.pull_request.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf pr-${{ github.event.pull_request.number }}
            git commit -m "chore: remove storybook for pr-${{ github.event.pull_request.number }}"
            git push
          fi

      - name: Delete PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: storybook
          delete: true
